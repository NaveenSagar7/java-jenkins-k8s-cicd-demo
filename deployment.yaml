apiVersion: apps/v1
kind: Deployment
metadata:
  name: java-demo

spec:
  replicas: 2

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1

  selector:
    matchLabels:
      app: java-demo

  template:
    metadata:
      labels:
        app: java-demo

    spec:
      containers:

      - name: java-demo
        image: dockerhub-user/java-demo:latest

        ports:
        - containerPort: 8080

        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5

        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 20
